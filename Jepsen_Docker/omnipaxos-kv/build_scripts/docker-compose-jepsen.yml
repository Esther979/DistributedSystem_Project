x-common-server-variables: &common-server-variables
  RUST_LOG: "info"
  SERVER_CONFIG_FILE: "/app/server-config.toml"
  CLUSTER_CONFIG_FILE: "/app/cluster-config.toml"
  OMNIPAXOS_NODE_ADDRS: "s1:8000,s2:8000,s3:8000"
  OMNIPAXOS_LISTEN_ADDRESS: "0.0.0.0"
  OMNIPAXOS_LISTEN_PORT: 8000

services:
  s1:
    image: omnipaxos-server-jepsen
    container_name: s1
    hostname: s1
    environment:
      <<: *common-server-variables
    volumes:
      - ./server-1-jepsen-config.toml:/app/server-config.toml
      - ./cluster-config.toml:/app/cluster-config.toml
    ports:
      - "8081:8080"
    cap_add:
      - NET_ADMIN
    networks:
      - jepsen

  s2:
    image: omnipaxos-server-jepsen
    container_name: s2
    hostname: s2
    environment:
      <<: *common-server-variables
    volumes:
      - ./server-2-jepsen-config.toml:/app/server-config.toml
      - ./cluster-config.toml:/app/cluster-config.toml
    ports:
      - "8082:8080"
    cap_add:
      - NET_ADMIN
    networks:
      - jepsen

  s3:
    image: omnipaxos-server-jepsen
    container_name: s3
    hostname: s3
    environment:
      <<: *common-server-variables
    volumes:
      - ./server-3-jepsen-config.toml:/app/server-config.toml
      - ./cluster-config.toml:/app/cluster-config.toml
    ports:
      - "8083:8080"
    cap_add:
      - NET_ADMIN
    networks:
      - jepsen

networks:
  jepsen:
    driver: bridge
